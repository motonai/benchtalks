name: Release

# triggers on any tag that looks like a version number: v1.0.0, v2.1.3, etc.
# push the tag to trigger a release:
#   git tag 
#   git push origin
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write        # needed to create GitHub releases and upload binaries
  packages: write        # needed to push to ghcr.io

jobs:

  # ── Job 1: build binaries and attach to GitHub release ──────────────────────
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64 # Apple Silicon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o benchtalks-${{ matrix.suffix }} .

      # -s -w strips debug info from the binary — makes it ~30% smaller
      # with no effect on runtime behaviour

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: benchtalks-${{ matrix.suffix }}
          # creates the release automatically from the tag
          # release name will be the tag: "v1.0.0"
          generate_release_notes: true

  # ── Job 2: build Docker image and push to ghcr.io ───────────────────────────
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the amd64 GitHub runner emulate arm64 for cross-compilation
      # without it, you can only build for the runner's native architecture
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # buildx is Docker's extended build system — required for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is automatically available in all GitHub Actions workflows
          # no manual secret needed for ghcr.io

      - name: Extract version tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/isidman/benchtalks
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          # this produces two tags on every release:
          #   ghcr.io/isidman/benchtalks:1.0.0  (version without the v prefix)
          #   ghcr.io/isidman/benchtalks:latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # cache layers between builds — makes subsequent releases much faster
          cache-from: type=gha
          cache-to: type=gha,mode=max