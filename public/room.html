<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenchTalks - Room</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* styles specific to room.html */
    body {
      padding: 0;
    }
    
    .room-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    
    @media (prefers-color-scheme: light) {
      .room-container {
            background: #ffffff;
            color: #1a1a1a;
        }
    }
    
    
    .room-header {
      padding: 16px 20px;
      border-bottom: 1px solid #404040;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    @media (prefers-color-scheme: light) {
      .room-header {
            border-bottom-color: #d0d0d0;
        }
    }
    
    .room-info h2 {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }
    
    .room-status {
      font-size: 0.85rem;
      opacity: 0.7;
    }
    
    .room-actions {
      display: flex;
      gap: 8px;
    }
    
        
    
    .admin-dropdown {
        position: absolute;
        top: 100%;
        right: 0;
        margin-top: 4px;
        background: #1a1a1a;
        border: 1px solid #404040;
        min-width: 200px;
        z-index: 100;
    }

    @media (prefers-color-scheme: light) {
        .admin-dropdown {
            background: #ffffff;
            border-color: #d0d0d0;
        }
    }

    .dropdown-item {
        display: block;
        width: 100%;
        padding: 10px 16px;
        text-align: left;
        background: transparent;
        border: none;
        color: inherit;
        font-family: inherit;
        font-size: 0.85rem;
        cursor: pointer;
    }

    .dropdown-item:hover {
        background: #2a2a2a;
    }

    @media (prefers-color-scheme: light) {
        .dropdown-item:hover {
            background: #f0f0f0;
        }
    }

    .dropdown-item-danger {
        color: #dc2626;
    }

    .dropdown-item-danger:hover {
        background: #dc2626;
        color: #ffffff;
    }

    /* invite modal */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
    }

    @media (prefers-color-scheme: light) {
        .modal-overlay {
            background: rgba(0, 0, 0, 0.3);
        }
    }

    .modal-box {
        background: #1a1a1a;
        border: 1px solid #404040;
        padding: 24px;
        max-width: 480px;
        width: 90%;
    }

    @media (prefers-color-scheme: light) {
        .modal-box {
            background: #ffffff;
            border-color: #d0d0d0;
        }
    }

    .modal-box h3 {
        margin-bottom: 4px;
    }
    
    .btn-small {
      padding: 8px 16px;
      font-size: 0.85rem;
      border: 1px solid #e0e0e0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-family: inherit;
    }
    
    @media (prefers-color-scheme: light) {
      .btn-small {
            border-color: #1a1a1a;
        }
    }
    
    .btn-small:hover {
      background: #e0e0e0;
      color: #1a1a1a;
    }
    
    .btn-danger {
      border-color: #dc2626;
      color: #dc2626;
    }
    
    .btn-danger:hover {
      background: #dc2626;
      color: #ffffff;
    }
    
   
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      word-wrap: break-word;
    }
    
    .message-sender {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    
    .message-content {
      padding: 10px 14px;
      border: 1px solid #404040;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    
    @media (prefers-color-scheme: light) {
      .message-content {
            border-color: #d0d0d0;
        }
    }
    
    .message-time {
      font-size: 0.75rem;
      opacity: 0.5;
      margin-top: 4px;
    }
    
    
    .system-message {
      text-align: center;
      opacity: 0.6;
      font-size: 0.85rem;
      padding: 8px;
      margin: 8px auto;
    }
    
   
    .input-container {
      padding: 16px 20px;
      border-top: 1px solid #404040;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    
    @media (prefers-color-scheme: light) {
      .input-container {
            border-top-color: #d0d0d0;
        }
    }
    
    #messageInput {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #404040;
      background: transparent;
      color: inherit;
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      min-height: 40px;
      max-height: 120px;
    }
    
    @media (prefers-color-scheme: light) {
      #messageInput {
            border-color: #d0d0d0;
        }
    }
    
    #messageInput:focus {
      outline: none;
      border-color: #e0e0e0;
    }
    
    @media (prefers-color-scheme: light) {
      #messageInput:focus {
            border-color: #1a1a1a;
        }
    }
    
    #sendBtn {
      padding: 10px 20px;
      border: 1px solid #e0e0e0;
      background: #e0e0e0;
      color: #1a1a1a;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    @media (prefers-color-scheme: light) {
      #sendBtn {
        background: #1a1a1a;
        color: #ffffff;
        border-color: #1a1a1a;
      }
    }
    
    #sendBtn:hover {
      opacity: 0.8;
    }
    
    #sendBtn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    
    #attachBtn {
        padding: 10px 12px;
        border: 1px solid #404040;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: 1.2rem;
    }

    @media (prefers-color-scheme: light) {
        #attachBtn {
            border-color: #d0d0d0;
        }
    }

    #attachBtn:hover {
        background: #404040;
    }

    @media (prefers-color-scheme: light) {
        #attachBtn:hover {
            background: #f0f0f0;
        }
    }


    .message-image {
        max-width: 100%;
        max-height: 400px;
        margin-top: 8px;
        cursor: pointer;
        border: 1px solid #404040;
    }

    @media (prefers-color-scheme: light) {
    .message-image {
            border-color: #d0d0d0;
        }
    }

    .message-image:hover {
        opacity: 0.9;
    }


    .image-loading {
      padding: 20px;
      text-align: center;
      opacity: 0.7;
      font-size: 0.9rem;
      border: 1px dashed #404040;
      margin-top: 8px;
    }

    @media (prefers-color-scheme: light) {
        .image-loading {
            border-color: #d0d0d0;
        }
    }

    .centered-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 40px;
    }
    
    .hidden {
      display: none;
    }

    #typingIndicator {
      font-style: italic;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {opacity: 0.4;}
      50% {opacity: 0.8;}
    }

    #soundToggle {
      cursor: pointer;
      margin-right: 4px;
    }

    #soundToggle:checked {
      accent-color: #e0e0e0;
    }

    @media (prefers-color-scheme: light) {
      #soundToggle:checked {
        accent-color: #1a1a1a;
      }
    }

    .link-container {
        display: flex;
        gap: 8px;
    }

    .link-container input {
        flex: 1;
        padding: 8px;
        border: 1px solid #404040;
        background: transparent;
        color: inherit;
        font-family: inherit;
        font-size: 0.85rem;
    }

    @media (prefers-color-scheme: light) {
        .link-container input {
            border-color: #d0d0d0;
        }
    }

  </style>
</head>
<body>
  <!-- loading state -->
  <div id="loadingState" class="centered-message">
    <div class="spinner"></div>
    <p style="margin-top: 16px;">Joining bench...</p>
  </div>

  <!-- error state -->
  <div id="errorState" class="centered-message hidden">
    <h2>⚠️ Unable to Join</h2>
    <p id="errorText" style="margin: 16px 0; opacity: 0.8;"></p>
    <button onclick="location.href='/'" class="btn-small">Go Home</button>
  </div>

  <!--Interface -->
  <div id="roomInterface" class="room-container hidden">
    
    <div class="room-header">
      <div class="room-info">
        <h2>🪑 BenchTalks</h2>
        <div class="room-status">
          <span id="userCount">0 people here</span>
          <label style="margin-left: 16px; font-size: 0.85rem; cursor: pointer;">
            <input type ="checkbox" id="soundToggle" checked>
            🔔 Sound
          </label>
        </div>
      </div>

      <div class="room-actions">
        <!-- admin dropdown — only visible if this client has the admin token -->
        <div id="adminMenu" class="hidden" style="position: relative;">
            <button id="adminMenuBtn" class="btn-small">Admin ▾</button>
            <div id="adminDropdown" class="admin-dropdown hidden">
                <button class="dropdown-item" id="inviteBtn"
                    title="Share this bench with others">
                    👥 Invite people
                </button>
                <button class="dropdown-item" id="newBenchBtn"
                    title="Create a new bench and open it in a new tab">
                    🪑 Create new bench
                </button>
                <!-- make public — only useful if bench has NATS peers configured.
                     hidden after use since it's a one-way action. -->
                <button class="dropdown-item" id="makePublicBtn"
                    title="Federate this room across all connected benches">
                    🌐 Make room public
                </button>
                <button class="dropdown-item dropdown-item-danger" id="deleteBenchBtn"
                    title="Permanently delete this bench for everyone">
                    🗑️ Delete this bench
                </button>
            </div>
        </div>

        <button onclick="location.href='/'" class="btn-small">Leave</button>
      </div>
    </div><!-- end room-header -->

    
    <div id="messagesContainer" class="messages-container">
      <!-- where the messages should appear -->
       <div id="typingIndicator" class="system-message" style="display: none;"></div>
    </div>

    
    <div class="input-container">
        <input
            type="file"
            id="imageInput"
            accept="image/*"
            style="display: none;"
        >
        <button id="attachBtn" class="btn-small" title="Attach image">📎</button>
      <textarea 
        id="messageInput" 
        placeholder="Type a message..."
        rows="1"
      ></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div><!-- end roomInterface -->

  <!-- invite modal — hidden until admin clicks Invite -->
  <!-- lives at body level so position:fixed covers the whole page -->
  <div id="inviteModal" class="modal-overlay hidden">
      <div class="modal-box">
          <h3>Invite people</h3>
          <p style="font-size: 0.85rem; opacity: 0.7; margin: 8px 0 12px;">
          Share this link. Anyone with it can join the bench.
          </p>
          <div class="link-container">
              <input type="text" id="inviteLinkInput" readonly>
              <button id="copyInviteBtn" class="btn-small">Copy</button>
          </div>
          <button id="closeModalBtn" class="btn-small" style="margin-top: 12px;">Close</button>
      </div>
  </div>

  <!--dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
  <script src="crypto.js"></script>
  
  <script>
    
    //state start
    
    let roomId = null;
    let encryptionKey = null;
    let adminToken = null;
    let displayName = null;
    let ws = null;
    let isConnected = false;
    let notificationSound = null;
    let soundEnabled = true;
    let userCount_n = 0;

    //first loads the page, then the sound is enabled
    function initSound() {
      try {
        notificationSound = new Audio('/sounds/notification.mp3');
        notificationSound.volume = 0.6;

        //preloading for less latency
        notificationSound.load();

        console.log('Notification sound loaded'); //debugging and testing
      } catch (error) {
        console.error('Failed to load notification sound:', error)
      }
    }

    //*new* Admin Dropdown

    const adminMenu = document.getElementById('adminMenu');
    const adminMenuBtn = document.getElementById('adminMenuBtn');
    const adminDropdown = document.getElementById('adminDropdown');
    const inviteModal = document.getElementById('inviteModal');
    const inviteLinkInput = document.getElementById('inviteLinkInput');
    const copyInviteBtn = document.getElementById('copyInviteBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const newBenchBtn = document.getElementById('newBenchBtn');
    const deleteBenchBtn = document.getElementById('deleteBenchBtn');
    const inviteBtn = document.getElementById('inviteBtn');
    const makePublicBtn = document.getElementById('makePublicBtn');

    //togglin and boppin
    adminMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation(); //this prevents the document click handler from immediately closing it down (SENDING IT TO JAIL)
        adminDropdown.classList.toggle('hidden');
    });

    //when user clicks outside of it, then it closes c:
    document.addEventListener('click', () => {
        adminDropdown.classList.add('hidden');
    });

    //Now it's going to build the shareable URL from the current room's id and key
    //enc.key and room id are already in state + "buildRoomURL" (in crypto.js) builds the URL without admin token sh*t. 
    // S U C C E S S
    inviteBtn.addEventListener('click', () => {
        adminDropdown.classList.add('hidden');
        const shareableURL = buildRoomURL(roomId, encryptionKey);
        inviteLinkInput.value = shareableURL;
        inviteModal.classList.remove('hidden');
    });

    //copy *p l a i n* invite link
    copyInviteBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(inviteLinkInput.value);
            copyInviteBtn.textContent = 'Copied!';
            setTimeout(() => { copyInviteBtn.textContent = 'Copy';}, 2000);
        } catch {
            inviteLinkInput.select();
        }
    });

    //closing modal
    closeModalBtn.addEventListener('click', () => {
        inviteModal.classList.add('hidden');
    });

    //closing modal too, but this time when clicking the overlay bg
    inviteModal.addEventListener('click', (e) => {
        //closing if only they clicked the dark overlay, not the box inside
        if (e.target === inviteModal) {
            inviteModal.classList.add('hidden');
        }
    });

    //this creates a new bench and opens it in a new tab
    newBenchBtn.addEventListener('click', async () => {
        adminDropdown.classList.add('hidden');

        //generate everything fresh - same as index.html "createRoom"
        //opening result in a new tab c:
        const newRoomId = generateId(16);
        const newKey = generateEncryptionKey();
        const newAdminToken = generateAdminToken();
        const newAdminURL = buildAdminURL(newRoomId, newKey, newAdminToken);

        window.open(newAdminURL, '_blank');
    });

    //deleting the bench
    deleteBenchBtn.addEventListener('click', () => {
        adminDropdown.classList.add('hidden');

        if (!confirm('Are you sure you want to delete this bench? Everyone will be kicked out.')) {
            return;
        }

        ws.send(JSON.stringify({
            type: 'delete',
            roomId: roomId,
            payload: adminToken
        }));
    });

    // making the room public — one-way, button hides itself after success
    // sends the raw admin token as payload; server hashes and verifies it
    // same pattern as delete, just a different message type
    makePublicBtn.addEventListener('click', () => {
        adminDropdown.classList.add('hidden');

        if (!confirm('Make this room public? Messages will be visible across all connected benches. This cannot be undone.')) {
            return;
        }

        ws.send(JSON.stringify({
            type: 'make_public',
            roomId: roomId,
            payload: adminToken
        }));
    });

    //doms
    
    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const errorText = document.getElementById('errorText');
    const roomInterface = document.getElementById('roomInterface');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const userCount = document.getElementById('userCount');
    const attachBtn = document.getElementById('attachBtn');
    const imageInput = document.getElementById('imageInput');

    //room start
    
    function init() {

        //read URL
        const urlData = parseRoomURL();
  
        if (!urlData.roomId || !urlData.encryptionKey) {
            showError('Invalid room link. Missing room ID or encryption key.');
            return;
        }
      
        roomId = urlData.roomId;
        encryptionKey = urlData.encryptionKey;
        adminToken = urlData.adminToken;

        if (adminToken) {
            // show the admin dropdown instead of the old delete button
            adminMenu.classList.remove('hidden');
        }
      
        displayName = prompt('What name do they know you by?') || 'Anonymous';
      
        if (!displayName.trim()) {
            displayName = 'Anonymous';
        }
      
        initSound();
    
        const soundToggle = document.getElementById('soundToggle');
        if (soundToggle) {
            const savedPref = localStorage.getItem('soundEnabled');
            if (savedPref !== null) {
                soundEnabled = savedPref === 'true';
                soundToggle.checked = soundEnabled;
            }
        } //Check aspects of defensive programming in JS

        // start connection to WS
        connectWebSocket();
    }
    
    //ws connection
    
    async function connectWebSocket() {
        // determine WS URL
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;

        ws = new WebSocket(wsUrl);

        // must be async because hashAdminToken uses await
        ws.onopen = async () => {
            console.log('WebSocket connected');

            // if this client is the admin, hash their token before sending
            // the server stores the hash — never the real token
            let adminHash = '';
            if (adminToken) {
                adminHash = await hashAdminToken(adminToken);
            }

            // join message — this is what creates the room on the server
            // if the room doesn't exist yet, the server creates it now
            // if it already exists, the client just joins
            ws.send(JSON.stringify({
                type: 'join',
                roomId: roomId,
                adminHash: adminHash,
                payload: displayName  // send username as payload
            }));

            // show the chat interface immediately after sending join
            // the server doesn't echo back to the sender so we don't
            // wait for a confirmation — connection is already established
            handleSelfJoined();
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            } catch (error) {
                console.error('Error parsing WebSocket message:', error);
            }
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            showError('Connection error. Please check your internet connection.'); //need to work on error handling
        };

        ws.onclose = () => {
            console.log('WebSocket closed');
            isConnected = false;
            addSystemMessage('Disconnected from bench');
        };
    }
    
    // how does ws handle messages?
    
    function handleWebSocketMessage(data) {
        console.log('Received:', data);

        switch (data.type) {
            case 'join':
                // someone joined — could be us (first join) or someone else
                if (!isConnected) {
                    // this is our own join confirmation
                    handleSelfJoined();
                } else {
                    userCount_n++;// someone else joined
                    updateUserCount(userCount_n);
                    addSystemMessage('Someone joined the bench');
                }
                break;

            case 'leave':
                // someone else left
                addSystemMessage('Someone left the bench');
                userCount_n = Math.max(0, userCount_n - 1);
                updateUserCount(userCount_n);
                break;

            case 'welcome':
                //server gives info on how many people are in the room at the moment
                //Better than counting join/leave events
                userCount_n = parseInt(data.payload);
                updateUserCount(userCount_n);
                break;

            case 'message':
                handleMessage(data);
                break;

            case 'image':
                handleImage(data);
                break;

            case 'deleted':
                // admin deleted the room — everyone gets this
                handleRoomDeleted();
                break;

            case 'made_public':
                // admin made the room public — everyone gets this including the admin
                // hide the button so it can't be clicked twice (it's one-way anyway)
                makePublicBtn.classList.add('hidden');
                addSystemMessage('🌐 This bench is now public — messages are visible across the park');
                break;

            case 'error':
                // server sent us an error (e.g. invalid admin token)
                console.error('Server error:', data.payload);
                alert(data.payload);
                break;

            default:
                console.log('Unknown message type:', data.type);
        }
    }

    function handleSelfJoined() {
        // our join was acknowledged — show the chat interface
        isConnected = true;
        loadingState.classList.add('hidden');
        roomInterface.classList.remove('hidden');
        addSystemMessage('You joined the bench');
        messageInput.focus();
    }

    function handleMessage(data) {
        // data.payload is the encrypted blob
        // data.senderId tells us who sent it
        const decrypted = decryptMessage(data.payload, encryptionKey);

        if (!decrypted) {
            console.error('Failed to decrypt message');
            return;
        }

        // play sound if this came from someone else
        // we identify ourselves by displayName inside the encrypted payload
        if (decrypted.sender !== displayName) {
            playNotificationSound();
        }

        addMessage(decrypted.sender, decrypted.text, decrypted.timestamp);
    }

    function handleImage(data) {
        // data.payload is the encrypted image blob (base64)
        // decrypt it directly — no HTTP download needed anymore
        const decrypted = decryptImageFromBase64(data.payload, encryptionKey);

        if (!decrypted) {
            console.error('Failed to decrypt image');
            addSystemMessage('❌ Failed to load image');
            return;
        }

        const imageUrl = URL.createObjectURL(decrypted);

        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
            <div class="message-sender">Image</div>
            <img
                src="${imageUrl}"
                class="message-image"
                alt="image"
                onclick="window.open(this.src)">`;
        messagesContainer.appendChild(div);
        scrollToBottom();
        playNotificationSound();
    }

    function handleRoomDeleted() {
        showError('This bench has been deleted by the creator.');
        ws.close();
    }

    //UI helper functions
    
    function updateUserCount(count) {
        const text = count === 1 ? '1 person here' : `${count} people here`;
        userCount.textContent = text;
    }
    
    function addSystemMessage(text) {
        const div = document.createElement('div');
        div.className = 'system-message';
        div.textContent = text;
        messagesContainer.appendChild(div);
        scrollToBottom();
    }
    
    function addMessage(sender, text, timestamp) {
        const div = document.createElement('div');
        div.className = 'message';
      
        const time = new Date(timestamp).toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
        });
      
        div.innerHTML = `
            <div class="message-sender">${escapeHtml(sender)}</div>
            <div class="message-content">${escapeHtml(text)}</div>
            <div class="message-time">${time}</div>
        `;
      
        messagesContainer.appendChild(div);
        scrollToBottom();
    }
    
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function playNotificationSound() {
        if (!soundEnabled) {
            return;
        }

        if (!notificationSound) {
            console.warn('Notification sound not loaded');
            return;
        }

        if (!document.hidden) {
            return; //when the tab is active, sounds will not be played.
        }

        notificationSound.currentTime = 0; //from the start
        notificationSound.play().catch(error => {
            console.log('Sound playback blocked:', error);
        });
    }

    function showError(message) {
        errorText.textContent = message;
        loadingState.classList.add('hidden');
        roomInterface.classList.add('hidden');
        errorState.classList.remove('hidden');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + 'B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1)+' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    // sending messages
    
    function sendMessage() {
        const text = messageInput.value.trim();

        if (!text || !isConnected) {
            return;
        }

        // making the message object
        const messageObj = {
            sender: displayName,
            text: text,
            timestamp: Date.now()
        };

        // encryption
        const encrypted = encryptMessage(messageObj, encryptionKey);

        // send to server — server forwards to everyone else
        // field names must match Go's IncomingMessage struct exactly
        ws.send(JSON.stringify({
            type: 'message',
            roomId: roomId,
            payload: encrypted
        }));

        // show our own message immediately — server doesn't echo back to sender
        addMessage(displayName, text, messageObj.timestamp);

        // clear input
        messageInput.value = '';
        messageInput.style.height = 'auto';
    }

    async function sendImage(file) {
        if (!file.type.startsWith('image/')) {
            alert('Only images are allowed to send in BenchTalks (for the moment at least)!');
            return;
        }

        const MAX_SIZE = 10 * 1024 * 1024; // 10MB
        if (file.size > MAX_SIZE) {
            alert('Image too large. Maximum size is 10MB!');
            return;
        }

        try {
            // encrypt the image client-side
            const encryptedData = await encryptImage(file, encryptionKey);

            // send as WebSocket message — same pattern as text
            // server forwards the encrypted blob to everyone else
            // no /api/upload, no disk storage, server never holds the image
            ws.send(JSON.stringify({
                type: 'image',
                roomId: roomId,
                payload: encryptedData
            }));

            // show our own image immediately — server doesn't echo back to sender
            const imageBlob = await decryptImageFromBase64(encryptedData, encryptionKey, file.type);
            const imageUrl = URL.createObjectURL(imageBlob);

            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="message-sender">You</div>
                <img
                    src="${imageUrl}"
                    class="message-image"
                    alt="${escapeHtml(file.name)}"
                    onclick="window.open(this.src)">
                <div class="message-time">${file.name} (${formatFileSize(file.size)})</div>`;
            messagesContainer.appendChild(div);
            scrollToBottom();

        } catch (error) {
            console.error('Error sending image:', error);
            addSystemMessage('❌ Failed to send image');
        }
    }
    
    //event listeners
    
    sendBtn.addEventListener('click', sendMessage);
    
    const soundToggle = document.getElementById('soundToggle');
    soundToggle.addEventListener('change', (e) => {
        soundEnabled = e.target.checked;

        localStorage.setItem('soundEnabled', soundEnabled);
        console.log('Sound notifications:', soundEnabled ? 'enabled' : 'disabled');

        if (soundEnabled && notificationSound) {
            notificationSound.currentTime = 0;
            notificationSound.play().catch(() => {});
        }
    });

    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // auto-resize textarea as user types
    messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = messageInput.scrollHeight + 'px';
    });

    attachBtn.addEventListener('click', () => {
        imageInput.click();
    });
    
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            sendImage(file);
        }
        imageInput.value = '';
    });
    
    
    init();
  </script>

</body>
</html>
